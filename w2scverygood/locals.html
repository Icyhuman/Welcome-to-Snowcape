        <script>
            const vname=document.getElementById("Villagername")
            const species=document.getElementById("Species")
            const bday=document.getElementById("bday")
            const dreamjob=document.getElementById("dreamjob")
            const desc=document.getElementById("desc")
            const pfp=document.getElementById("pfp")
            const screenshot=document.getElementById("screenshot")
            const siggy=document.getElementById("siggy")

            function profileswitch(vdata){
                let name=vdata[0]
                vname.innerHTML=name
                species.innerHTML=vdata[1]
                bday.innerHTML=vdata[2]
                dreamjob.innerHTML=vdata[3]
                desc.innerHTML=vdata[4]
                pfp.src="imgs/locals/"+name+"pfp.png"
                screenshot.src="imgs/locals/"+name+"ss.jpg"
                siggy.src="imgs/locals/"+name+"sig.png"
            }
            profileswitch(["Kid Cat","Monkey","testin","Software Developer","descripto 2 delyuiftyuftyuxe edition"])


            const vprofiles = [
                ["Jørgen","Human","May 28th","Software Developer","I still remember when I got into Animal crossing. Since I live in a small town in Norway, the closest video game store is a 2 hour bike ride away on the other side of a mountain. One summer day, I decided that I really wanted a new game for my 3ds, so I made the trip. There was this cool game called Animal Crossing: New Leaf on the shelf at Gamestop(this was back before Gamestop stopped operating in Norway, rip). Since then, I've put 300ish hours into New Leaf, as well as more than 1000 hours in New Horizons. I also got a Master's degree in informatics, but the job market is rough, so I'm doing data entry at an insurance firm for now. That's how I ended up making this website, actually. I needed to use my skills for something to not feel like I wasted 5 years of my life getting my degree. At least my education amounted to something I suppose. Shoutout to Eni for telling me about Neocities, I think this site is doing a pretty good job keeping me sane."],
                ["Bam","Deer","November 7th","Soccer Player","One of the original residents present at the founding of Snowcape, I'll always remember this guy. Problem is, your starting villagers get really generic empty houses, and the ability to change their house to their regular one didn't exist yet. Thus, Bam was stuck with a terrible looking house, and when he brought up moving I went along with it and let him go."],
                ["Tammy","Bear Cub","June 23rd","Movie Director","I still remember back in New Leaf when Tammy spontaneously came up to me and told me how much she appreciated me for being her friend. She used to live across the river from me, next to some perfect cherry trees. And then, when I got New Horizons and started my island, she was right there. After settling on a whole new island with me, she was eventually reunited with her old friend Tammi, and started a band. She's also great friends with old man Static, even if they sound like enemies sometimes. When crops were introduced to the game, I built a farm, and put it in her capable hands. I also have her amiibo because I obviously had to, she is pretty much the main character of Animal Crossing from my perspective. She's been there the whole time(except for 3 days when I moved her out and back in to reset her house). It's honestly hard to imagine her not being in my town. Also lmao I made her description twice the length of everyone else."],
                ["Bangle","Tiger","August 27th","President","While she didn't do anything super memorable on Snowcape back in 2020, Bangle was the first former villager to come by the hotel after the 3.0 update released. She still recognised me even after all these years, which was really nice."],
                ["Nate","Bear","August 16th","Sumo Wrestler","One of the key moments of Snowcape history is when I realized the superhero costume had an N on it, and worked with Nate's color scheme. On that day, Super Nate was born. He eventually moved out, but thanks to the Happy Home Paradise DLC, he is still hanging around in my game. He runs the café 'Seaside Snax' along with his friend Bones by day, and by night Super Nate works wiht his sidekick, Bone-Boy, solving crimes from their vacation home."],
                ["Annalisa","Anteater","February 6th","Astronaut","Annalisa was part of the early crowd on the island, but wasn't really that notable. I also wasn't taking that many screenshots back then, so she's on like one photo that isn't a big group one. She's still pretty cute though."],
                ["Curlos","Sheep","May 8th","Actor","If you've played New Horizons, you know that the tutorial features a villager moving in whether you like it or not. Yeah, that was Curlos. It's a lot easier to connect with villagers when you personally invite them to move in, at least for me. Due to that, I never really connected with Curlos. Nothing against the guy, he's pretty cute, but it just didn't click for me."],
                ["Henry","Frog","September 21st","Writer","My sister was watching while I was looking for villagers, and when I ran into this Henry guy, she insisted that I invite him to Snowcape. He eventually grew on me, and has lived on Snowcape ever since. I often catch him singing, and always stop to listen."],
                ["Tipper","Cow","August 25th","Violinist","Tipper hung around Snowcape for a while back in 2020, before eventually moving on to new places. After the Happy Home Paradise DLC came out, she's been running a farm at the archipelago, probably growing high quality vegetables."],
                ["Tammi","Monkey","April 2nd","Artist","Tammi and Tammy used to be best friends in my town in New Leaf, so when I ran into Tammi in New Horizons I knew I had to reunite them. I even set up a band for them, with a cool logo, merch and everything. While Tammi eventually moved away from Snowcape, her and Tammy still have a vacation home together, and TnT is still going strong."],
                ["Fuchsia","Deer","September 19th","Makeup Artist","When I ran into Fuchsia, I knew I had to invite her to Snowcape. Her color scheme was way too cool to pass up on. Sadly, as I kept building up Snowcape, I never really ended up building anything wild enough to match her energy. She eventually moved on to see the world, but she still has a vacation home at Paradise Planning that I visit sometimes."],
                ["Bones","Dog","August 4th","Explorer","Bones never really stood out all that much. He was just the lovable little guy that I liked seeing walk around my island. This became especially true after the Super Nate incident, which caused Bones to slip into the role of a Bone-Boy, Super Nate's sidekick. He's still hanging out with Nate in the Happy Home Paradise DLC, running a café by day and solving crimes by night."],
                ["Fauna","Deer","March 26th","Teacher","Durimg the time she lived on Snowcape, Fauna was probably one of my most photographed villagers. I mean, how could I not take pictures of her? She looks super cute pretty much no matter what she does. She eventually moved to my sister's island, where I've visited her several times. In more recent times, shes gotten herself a vacation home in the Happy Home Paradise DLC, and works as a chef alongside her assistant, Bettina."],
                ["Marina","Octopus","June 26th","Pharmacist","I invited Marina to my island because octopus villagers are pretty cool and unique. Then I met Zucker, who is an octopus and also a food villager, which I like because it's cool and unique. As the kids say, Marina got straight up Mogged. Sometimes I wish you could have more villagers on your island, cause Marina is quite cute despite being a mogging victim."],
                ["Static","Squirrel","July 9th","Guitarist","So, cool story about Static. I bought some villager amiibos on Etsy, so I could have amiibo of my favorite villagers. I also got a couple amiibo of villagers that I didn't have but thought looked cool. One of those was Static. Now guess who shows up at my campsite while I am waiting for the amiibo to arrive. This cool lil squirrel guy. At that point, I decided that it was destiny for him to live on my island, and he's stayed there ever since."],
                ["Roald","Penguin","January 5th","Pro Golfer","Roald was one of my sister's favorite villagers, but he never really clicked for me. He eventually left Snowcape to make space for new villagers, but he still runs a car repair shop over at the archipelago, and is happily spending his days fixing up cars."],
                ["Zucker","Octopus","March 8th","Chef","Buy his snacks please<br>Buy his snacks please...<br>Buy his snacks please!<br>For real though, I love this silly little guy. I built him a neat little café on the beach next to his house, and made his greeting into an ad for it. Very funny, love the guy, please visit Zucker's seaside snax."],
                ["Willow","Sheep","November 26th","Designer","I like Willow a lot. Pink clothes look very good on her. She's also always very nice to me. To be honest, I can't exactly describe why I never want her to leave Snowcape, I just know she's great and I never want her to leave. Even if the clothes she gifts me never work with my outfits."],
                ["Melba","Koala","April 12th","Professor","I always wanted to have a koala in my town back in New Leaf because their ears are very cool. Never found one though. But here, in New Horizons, I finally got my koala, and I couldn't be happier. Melba is the best and I love her."],
                ["Reneigh","Horse","June 4th","Unknown","I used to have a gang on the island, who wore skull tees and were known as the 'Bone Zone'. I mean, it all happened in my head because it's not an actual thing in the game, but they were really cool and hung out and did cool stuff(trust me). Reneigh was a key member of this crew, alongside Tammy, Static and Melba. She has since calmed down a bit, and is now a waiter at the restaurant 'Mom's Spaghetti' alongside her friend Renée"],
                ["Carmen","Rabbit","January 6th","Movie Director","They say absence makes the heart grow fonder, and I think Carmen confirms that. After she moved out the first time, I started to miss her, to the point where I got her amiibo to move her back in. She moved out again to make space for Ione, but it's all good because this was after the 3.0 update, where you can invite villagers to the hotel using their amiibo. She is now a permanent VIP at the Snowcape hotel."],
                ["Mira","Rabbit","July 6th","Makeup Artist","Sorry that the screenshot of Mira is just her in a tent, but she only lived on my island for a week, before Kid Cat showed up at my campsite. I really wanted him, but someone had to leave, and the fact that Mira also lives in my old town on my 3ds meant that she was the easiest one to let go to make space for KC. She's still doing great back in old Snowcape though."],
                ["Kid Cat","Cat","August 1st","Superhero","Kid Cat, or KC, came by to solve the totally real and not made up in my head crime wave caused by Super Nate moving away from Snowcape. He stayed around the island for a bit, but eventually left the now crime-free island of Snowcape to seek new adventures."],
                ["Tia","Elephant","November 18th","Dentist","I really like tea, which might be why Tia resonated with me so much. I even ended up building her a cute little café called Tia's tea garden. It's been pretty popular since the 3.0 update introduced tourists. I smile a bit every time I walk past and see someone sitting there enjoying some tea."],
                ["Freya","Wolf","December 14th","Judge","Freya used to live in my old New Leaf town as well, at least for a while. There's a reason I drew a suitcase for her signature. She moves into town, stays around for a few months, and then continues on her travels to see the world. Hopefully she will show up in my town whenever the next Animal crossing game comes out. She's a nice recurring character."],
                ["Quinn","Eagle","January 20th","Unknown","Ever the fashion icon, Quinn eventually got too big for the little town of Snowcape. With my help, she's now got a photo studio set up, and she spends her days designing outfits and doing fashion shoots."],
                ["Kabuki","Cat","November 29th","Actor","I already had a japanese themed area on my island, so when Kabuki showed up at the campsite it was pretty obvious that I had to get him to move in. Honestly, thank god he did, I was struggling to fill that area with stuff, and moving his house there really helped tie the aesthetic together. It's on the southeast part of my island btw. Check it out on the cool interactive map I made at snowcape.neocities.org.(Does it make sense to promote my website on my own website? idk)"],
                ["Tangy","Cat","June 17th","Hairstylist","When the 3.0 update was anounced, I figured I'd log in a few days in advance to clean up my island in preparation of the update. It just so happened that there was a familiar face at the campsite that day. Tangy used to live in my town back on the 3ds, so her showing up felt like she wanted to come along for the ride and enjoy the update with me. Her moving in along with Tia and Zucker means I now have 3 food-themed villagers, but can you blame me? I really like the food designs:)"],
                ["Ione","Squirrel","September 11th","Unknown","Ione is new in town, so I don't have a lot of memories with her yet. But she's great, right? HER TAIL IS SPACE. ALSO SHE GLOWS IN THE DARK. THATS INCREDIBLE. SHES SO COOL."],
            ]
            profileswitch(vprofiles[15])
        </script>
